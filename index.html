const trunkY = 360;
const layerSpacingX = 170;
const trunkStartX = 140;
const svgWidth = trunkStartX + layerSpacingX * layers.length + 140;
const svgHeight = 720;

const expanded = new Set();
let activeSubUid = null;
let closeTimer = null;

function scheduleClose() {
  clearTimeout(closeTimer);
  closeTimer = setTimeout(() => { closePopup(); }, 180);
}
function cancelClose() {
  clearTimeout(closeTimer);
  closeTimer = null;
}

function dirForLayer(i) { return i % 2 === 0 ? 1 : -1; }

// Straight vertical column — no zigzag
function subPosition(L, index, total, dir) {
  const baseRadius = 58;
  const step = 62;
  const yOffset = dir * (baseRadius + index * step);
  return { x: L.x, y: L.y + yOffset };
}

function layout() {
  layers.forEach((L, i) => {
    L._uid = L.id;
    L._dir = dirForLayer(i);
    L.x = trunkStartX + i * layerSpacingX;
    L.y = trunkY;
    L.children.forEach((sub, j) => {
      sub._uid = `${L.id}-S${j}`;
      sub.parent = L;
      const p = subPosition(L, j, L.children.length, L._dir);
      sub.x = p.x;
      sub.y = p.y;
    });
  });
}

const gBranches = svg.append("g");
const gNodes = svg.append("g");

const popup = d3.select("#canvas").append("div").attr("class", "popup")
  .on("mouseenter", () => cancelClose())
  .on("mouseleave", () => scheduleClose());

const chainColors = {
  energy: "#ff9500", compute: "#007aff", money: "#30d158",
  warn: "#ff3b30"
};

function closePopup() {
  popup.classed("visible", false);
  setTimeout(() => popup.style("display", "none"), 280);
  activeSubUid = null;
  render();
}
window.__closePopup = closePopup;

function openPopup(sub) {
  activeSubUid = sub._uid;
  const L = sub.parent;
  // Sort tickers: 持仓 > 关注 > 候选
  const statusOrder = { pos: 0, watch: 1, todo: 2 };
  const tickers = (sub.tickers || []).slice().sort((a, b) => {
    const sa = statusOrder[a.status] ?? 3;
    const sb = statusOrder[b.status] ?? 3;
    return sa - sb;
  });

  let html = `
    <div class="popup-header">
      <div>
        <div class="popup-title">${sub.name}</div>
        <div class="popup-layer">${L.name} · ${tickers.length} 个标的</div>
      </div>
      <button class="popup-close" onclick="window.__closePopup()">×</button>
    </div>
    <div class="popup-section popup-section--tickers">
      <div class="ticker-list">
  `;
  if (tickers.length === 0) {
    html += `<div class="ticker-empty">待填</div>`;
  } else {
    tickers.forEach(t => {
      const tag = t.status === 'pos' ? '<span class="ticker-tag pos">持仓</span>'
                : t.status === 'watch' ? '<span class="ticker-tag watch">关注</span>'
                : '<span class="ticker-tag">候选</span>';
      html += `
        <label class="ticker-row">
          <input type="checkbox">
          <span class="ticker-code">${t.code}</span>
          <span class="ticker-name">${t.name || ''}</span>
          ${tag}
        </label>
      `;
    });
  }
  html += `</div></div>`;

  popup.html(html);
  const canvas = document.getElementById('canvas');
  const popW = 300;
  const popMaxH = 400;
  const viewL = canvas.scrollLeft;
  const viewR = canvas.scrollLeft + canvas.clientWidth;
  const viewT = canvas.scrollTop;
  const viewB = canvas.scrollTop + canvas.clientHeight;
  let px = sub.x + 24;
  let py = sub.y - 24;
  // flip to left if right overflow
  if (px + popW > viewR - 12) px = sub.x - popW - 24;
  // clamp within viewport
  px = Math.max(viewL + 12, Math.min(px, viewR - popW - 12));
  py = Math.max(viewT + 12, Math.min(py, viewB - popMaxH - 12));
  popup.style("left", px + "px").style("top", py + "px").style("display", "block");
  // trigger animation
  requestAnimationFrame(() => popup.classed("visible", true));
  render();
}

// Straight line path from trunk node to sub-node
function branchPath(from, to) {
  return `M ${from.x},${from.y} L ${to.x},${to.y}`;
}

function render() {
  // --- Trunk lines ---
  const trunkLinks = layers.slice(0, -1).map((L, i) => ({
    x1: L.x + 16, y1: L.y,
    x2: layers[i+1].x - 16, y2: layers[i+1].y
  }));

  const tl = gTrunk.selectAll("line.trunk").data(trunkLinks);
  tl.enter().append("line").attr("class", "trunk-link trunk")
    .attr("marker-end", "url(#arrow)")
    .merge(tl)
    .attr("x1", d=>d.x1).attr("y1", d=>d.y1)
    .attr("x2", d=>d.x2).attr("y2", d=>d.y2);
  tl.exit().remove();

  // --- Collect visible nodes and branch links ---
  const visibleNodes = [];
  const visibleBranches = [];

  layers.forEach(L => {
    visibleNodes.push({ node: L, role: "layer", chain: L.chain, delay: 0 });
    if (expanded.has(L._uid)) {
      L.children.forEach((sub, i) => {
        visibleNodes.push({ node: sub, role: "sub", chain: L.chain, delay: i * 65 });
        const offset = L._dir > 0 ? 15 : -15;
        visibleBranches.push({
          key: sub._uid,
          from: { x: L.x, y: L.y + offset },
          to: { x: sub.x, y: sub.y - offset }
        });
      });
    }
  });

  // --- Branch paths (curved) ---
  const bp = gBranches.selectAll("path.branch").data(visibleBranches, d => d.key);

  const bpEnter = bp.enter().append("path").attr("class", "branch-link branch")
    .attr("d", d => branchPath(d.from, d.from))
    .style("opacity", 0);

  bp.merge(bpEnter).transition()
    .duration(320)
    .delay((d, i) => i * 30)
    .ease(d3.easeCubicOut)
    .attr("d", d => branchPath(d.from, d.to))
    .style("opacity", 1);

  bp.exit().transition().duration(180).style("opacity", 0).remove();

  // --- Nodes ---
  const nd = gNodes.selectAll("g.node").data(visibleNodes, d => d.node._uid);

  const ndEnter = nd.enter().append("g")
    .attr("class", d => classesFor(d))
    .attr("transform", d => {
      // New subs fly in from parent position
      if (d.role === "sub" && d.node.parent) {
        return `translate(${d.node.parent.x},${d.node.parent.y}) scale(0.3)`;
      }
      return `translate(${d.node.x},${d.node.y}) scale(0.6)`;
    })
    .style("opacity", 0)
    .on("click", (event, d) => {
      event.stopPropagation();
      if (d.role === "layer") {
        if (activeSubUid) closePopup();
        if (expanded.has(d.node._uid)) expanded.delete(d.node._uid);
        else expanded.add(d.node._uid);
        render();
      } else if (d.role === "sub") {
        openPopup(d.node);
      }
    })
    .on("mouseenter", (event, d) => {
      if (d.role === "sub") {
        cancelClose();
        if (activeSubUid !== d.node._uid) openPopup(d.node);
      }
    })
    .on("mouseleave", (event, d) => {
      if (d.role === "sub") {
        scheduleClose();
      }
    });

  // Node radius scales by bottleneck score (bn 1-5)
  // Layer: r = 11 + bn*1.6  (bn=2→14.2, bn=5→19)
  // Sub:   r = 7 + bn*1.3   (bn=2→9.6,  bn=5→13.5)
  ndEnter.append("circle")
    .attr("r", d => {
      const bn = d.node.bn || 2;
      return d.role === "layer" ? (11 + bn * 1.6) : (7 + bn * 1.3);
    });

  ndEnter.append("text")
    .attr("y", d => {
      const bn = d.node.bn || 2;
      const r = d.role === "layer" ? (11 + bn * 1.6) : (7 + bn * 1.3);
      return d.role === "layer" ? -(r + 10) : 0;
    })
    .attr("x", d => {
      const bn = d.node.bn || 2;
      const r = 7 + bn * 1.3;
      return d.role === "layer" ? 0 : (r + 6);
    })
    .attr("text-anchor", d => d.role === "layer" ? "middle" : "start")
    .attr("dy", d => d.role === "layer" ? 0 : "0.32em")
    .attr("stroke", "#fbfbfd")
    .attr("stroke-width", 3.5)
    .attr("paint-order", "stroke")
    .text(d => d.node.name);

  nd.merge(ndEnter).transition()
    .duration(380)
    .delay(d => d.delay || 0)
    .ease(d3.easeCubicOut)
    .attr("transform", d => `translate(${d.node.x},${d.node.y}) scale(1)`)
    .style("opacity", 1)
    .attr("class", d => classesFor(d));

  nd.exit().transition()
    .duration(200)
    .style("opacity", 0)
    .attr("transform", d => {
      if (d.role === "sub" && d.node.parent) {
        return `translate(${d.node.parent.x},${d.node.parent.y}) scale(0.3)`;
      }
      return `translate(${d.node.x},${d.node.y}) scale(0.6)`;
    })
    .remove();
}

function classesFor(d) {
  const c = ["node", d.role];
  if (d.chain) c.push(d.chain);
  if (d.role === "layer" && expanded.has(d.node._uid)) c.push("expanded");
  if (d.role === "sub" && activeSubUid === d.node._uid) c.push("active");
  return c.join(" ");
}

document.addEventListener("click", (e) => {
  if (!e.target.closest(".popup") && !e.target.closest(".node")) {
    if (activeSubUid) closePopup();
  }
});

render();
</script>
</body>
</html>
