<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>AI 产业价值链</title>
  <style>
    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      background: #f2f2f7;
      color: #1c1c1e;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
      font-size: 15px;
      letter-spacing: -0.01em;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      backdrop-filter: saturate(180%) blur(16px);
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      padding: 14px 16px 10px;
      padding-top: calc(14px + env(safe-area-inset-top));
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
    }
    h1 {
      font-family: "SF Pro Display", -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .sub {
      color: #8e8e93;
      font-size: 12px;
      margin-top: 3px;
    }
    .legend {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }
    .legend::-webkit-scrollbar { display: none; }
    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: #e5e5ea;
      border-radius: 20px;
      font-size: 12px;
      color: #3a3a3c;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .dot-energy { background: #ff9500; }
    .dot-compute { background: #007aff; }
    .dot-money { background: #30d158; }
    .dot-warn { background: #ff3b30; }

    main {
      padding: 12px 14px 80px;
    }

    /* Layer card */
    .layer {
      background: white;
      border-radius: 14px;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: 0 0.5px 0 rgba(0,0,0,0.05);
    }
    .layer-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      min-height: 56px;
      background: white;
      border: none;
      width: 100%;
      text-align: left;
      cursor: pointer;
      font: inherit;
      color: inherit;
      transition: background 0.12s;
    }
    .layer-head:active { background: #f2f2f7; }
    .layer-side-bar {
      width: 4px;
      align-self: stretch;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .bar-energy { background: #ff9500; }
    .bar-compute { background: #007aff; }
    .bar-money { background: #30d158; }
    .bar-warn { background: #ff3b30; }
    .layer-main { flex: 1; min-width: 0; }
    .layer-id {
      font-size: 11px;
      color: #8e8e93;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }
    .layer-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1c1c1e;
    }
    .layer-name .warn-icon { color: #ff3b30; margin-left: 2px; font-size: 12px; }
    .bn-meter {
      display: inline-flex;
      gap: 2px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .bn-bar {
      width: 3px;
      height: 10px;
      border-radius: 1px;
      background: #d1d1d6;
    }
    .bn-bar.on { background: currentColor; }
    .layer-count {
      font-size: 13px;
      color: #8e8e93;
      font-variant-numeric: tabular-nums;
    }
    .chevron {
      width: 16px; height: 16px;
      color: #c7c7cc;
      transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1);
      flex-shrink: 0;
    }
    .layer.open .chevron { transform: rotate(90deg); }

    /* Subs inside layer */
    .subs {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.2, 0, 0, 1);
      background: #f9f9fb;
    }
    .layer.open .subs { max-height: 2000px; }
    .sub {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px 12px 30px;
      border-top: 0.5px solid rgba(0,0,0,0.06);
      min-height: 48px;
      cursor: pointer;
      background: transparent;
      border-left: none;
      border-right: none;
      border-bottom: none;
      width: 100%;
      text-align: left;
      font: inherit;
      color: inherit;
      transition: background 0.12s;
    }
    .sub:active { background: rgba(0,0,0,0.04); }
    .sub-name {
      flex: 1;
      font-size: 14.5px;
      color: #1c1c1e;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .sub-count {
      font-size: 13px;
      color: #8e8e93;
      background: #e5e5ea;
      padding: 2px 8px;
      border-radius: 10px;
      font-variant-numeric: tabular-nums;
      min-width: 22px;
      text-align: center;
    }

    /* Ticker list inside sub */
    .tickers {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.2, 0, 0, 1);
      background: white;
    }
    .sub-wrapper.open .tickers {
      max-height: 600px;
    }
    .ticker {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px 11px 44px;
      border-top: 0.5px solid rgba(0,0,0,0.05);
      min-height: 44px;
    }
    .ticker-code {
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
      font-weight: 600;
      color: #007aff;
      font-size: 13px;
      min-width: 78px;
    }
    .ticker-name {
      flex: 1;
      font-size: 13px;
      color: #3a3a3c;
      line-height: 1.35;
    }
    .ticker-tag {
      font-size: 10.5px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      white-space: nowrap;
      background: #e5e5ea;
      color: #6e6e73;
    }
    .ticker-tag.pos { background: #e4fbeb; color: #148f3e; }
    .ticker-tag.watch { background: #fff2df; color: #b15a00; }
    .empty {
      padding: 14px 16px 14px 44px;
      font-size: 13px;
      color: #c7c7cc;
      font-style: italic;
    }

    /* Chain color token inheritance */
    .layer.energy .bn-bar.on { background: #ff9500; }
    .layer.compute .bn-bar.on { background: #007aff; }
    .layer.money .bn-bar.on { background: #30d158; }
    .layer.warn .bn-bar.on { background: #ff3b30; }
    .layer.warn .layer-name { color: #1c1c1e; }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px 14px 30px;
      color: #8e8e93;
      font-size: 11px;
    }
    footer a { color: #007aff; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>AI 产业价值链</h1>
    <div class="sub">10 层 · 上游 → 下游 · 节点紧缺度 1–5</div>
    <div class="legend">
      <span class="legend-chip"><span class="legend-dot dot-energy"></span>能量链</span>

    </div>
  </header>

  <main id="app"></main>

  <footer>
    v1 · <a href="index.html">切换桌面版</a>

const statusOrder = { pos:0, watch:1, todo:2 };
const statusLabel = { pos:"持仓", watch:"关注", todo:"候选" };

function bnMeter(bn, chain) {
  let html = `<span class="bn-meter" style="color:${chainColor(chain)}">`;
  for (let i = 1; i <= 5; i++) {
    html += `<span class="bn-bar ${i <= bn ? 'on' : ''}"></span>`;
  }
  html += `</span>`;
  return html;
}
function chainColor(c) {
  return ({energy:"#ff9500", compute:"#007aff", money:"#30d158", warn:"#ff3b30"})[c] || "#8e8e93";
}

const app = document.getElementById('app');
app.innerHTML = LAYERS.map(L => {
  const subsHtml = L.children.map(sub => {
    const sorted = (sub.tickers || []).slice().sort((a,b) => (statusOrder[a.status]??3) - (statusOrder[b.status]??3));
    const tickersHtml = sorted.length === 0
      ? `<div class="empty">待填</div>`
      : sorted.map(t => `
          <div class="ticker">
            <span class="ticker-code">${t.code}</span>
            <span class="ticker-name">${t.name || ''}</span>
            <span class="ticker-tag ${t.status}">${statusLabel[t.status] || '候选'}</span>
          </div>`).join('');
    const warnIcon = sub.warn ? '<span class="warn-icon">⚠️</span>' : '';
    return `
      <div class="sub-wrapper">
        <button class="sub" data-sub>
          <span class="sub-name">${sub.name}${warnIcon}</span>
          ${bnMeter(sub.bn, L.chain)}
          <span class="sub-count">${sorted.length}</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
        </button>
        <div class="tickers">${tickersHtml}</div>
      </div>
    `;
  }).join('');
  const warnIcon = L.warn ? '<span class="warn-icon">⚠️</span>' : '';
  return `
    <section class="layer ${L.chain}">
      <button class="layer-head" data-layer>
        <span class="layer-side-bar bar-${L.chain}"></span>
        <span class="layer-main">
          <div class="layer-id">${L.id}</div>
          <div class="layer-name">${L.name}${warnIcon}${bnMeter(L.bn, L.chain)}</div>
        </span>
        <span class="layer-count">${L.children.length}</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
      </button>
      <div class="subs">${subsHtml}</div>
    </section>
  `;
}).join('');

// Toggle layer
app.addEventListener('click', e => {
  const layerBtn = e.target.closest('[data-layer]');
  if (layerBtn) {
    layerBtn.closest('.layer').classList.toggle('open');
    return;
  }
  const subBtn = e.target.closest('[data-sub]');
  if (subBtn) {
    subBtn.parentElement.classList.toggle('open');
  }
});
</script>
</body>
</html>
