    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      backdrop-filter: saturate(180%) blur(16px);
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      padding: 14px 16px 10px;
      padding-top: calc(12px + env(safe-area-inset-top));
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
    }
    h1 {
      font-family: "SF Pro Display", -apple-system, sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.02em;
    }
    .sub-title {
      color: #8e8e93;
      font-size: 11.5px;
      margin-top: 2px;
    }
    .legend {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .legend::-webkit-scrollbar { display: none; }
    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      background: #e5e5ea;
      border-radius: 16px;
      font-size: 11px;
      color: #3a3a3c;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-energy { background: #ff9500; }
    .dot-compute { background: #007aff; }
    .dot-money { background: #30d158; }
    .dot-warn { background: #ff3b30; }

    #canvas {
      position: relative;
      padding-bottom: 60px;
    }
    svg { display: block; width: 100%; user-select: none; }

    /* SVG elements */
    .trunk { fill: none; stroke: #1c1c1e; stroke-width: 1.8; }
    .arrow-marker { fill: #1c1c1e; }
    .branch { fill: none; stroke: #c7c7cc; stroke-width: 1.2; }

    .node circle {
      fill: white;
      stroke-width: 1.5;
      transition: stroke-width 0.2s;
      filter: drop-shadow(0 1px 1.5px rgba(0,0,0,0.05));
    }
    .node.layer circle { stroke: #1c1c1e; }
    .node.layer.expanded circle { stroke-width: 2; }
    .node.active circle {
      stroke-width: 2.4;
      filter: drop-shadow(0 3px 8px rgba(0,122,255,0.25));
    }
    .node.energy circle { stroke: #ff9500; }
    .node.compute circle { stroke: #007aff; }
    .node.money circle { stroke: #30d158; }
    .node.warn circle { stroke: #ff3b30; fill: #fff6f6; }
    .node.energy.expanded circle { fill: #fff9ef; }
    .node.compute.expanded circle { fill: #f0f7ff; }
    .node.money.expanded circle { fill: #f0fdf4; }

    .node text {
      fill: #1c1c1e;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.02em;
      pointer-events: none;
    }
    .node.sub text { font-size: 12.5px; font-weight: 500; fill: #3a3a3c; }
    .node.layer .layer-id {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      fill: #8e8e93;
    }
    .count-badge {
      fill: #8e8e93;
      font-size: 10.5px;
      font-variant-numeric: tabular-nums;
    }

    /* Bottom sheet */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s cubic-bezier(0.2, 0, 0, 1);
      z-index: 20;
    }
    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: #f2f2f7;
      border-radius: 16px 16px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
      z-index: 21;
      max-height: 78vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -12px 40px rgba(0,0,0,0.18);
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle {
      margin: 8px auto 4px;
      width: 36px; height: 5px;
      border-radius: 3px;
      background: #c7c7cc;
    }
    .sheet-header {
      padding: 12px 20px 14px;
      border-bottom: 0.5px solid rgba(0,0,0,0.1);
    }
    .sheet-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #1c1c1e;
    }
    .sheet-sub {
      font-size: 12px;
      color: #8e8e93;
      margin-top: 2px;
    }
    .bn-meter {
      display: inline-flex;
      gap: 2px;
      margin-left: 8px;
      vertical-align: middle;
    }
    .bn-bar {
      width: 3px;
      height: 10px;
      border-radius: 1px;
      background: #d1d1d6;
    }
    .bn-bar.on { background: currentColor; }

    .ticker-list {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px 0 16px;
    }
    .ticker-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: white;
      border-bottom: 0.5px solid rgba(0,0,0,0.06);
      min-height: 48px;
    }

    .ticker-code {

      font-weight: 600;
      color: #007aff;
      font-size: 13px;
      min-width: 80px;
    }
    .ticker-name {

      color: #8e8e93;
      font-size: 11px;
    }
    footer a { color: #007aff; text-decoration: none; }

const statusLabel = { pos:"持仓", watch:"关注", todo:"候选" };

const expanded = new Set();
const canvas = document.getElementById('canvas');

// Radius from bn
function rForLayer(bn) { return 13 + (bn - 2) * 2; }     // bn2→13, bn5→19
function rForSub(bn)   { return 8 + (bn - 2) * 1.5; }    // bn2→8,  bn5→12.5

const TRUNK_X = 50;              // trunk vertical x
const SUB_X   = 150;             // sub circles x (right of trunk)
const TOP_PAD = 40;
const LAYER_SPACING_COLLAPSED = 90;
const SUB_VERT_STEP = 46;
const SUB_FIRST_OFFSET = 40;     // first sub y offset from layer center
const SUB_BOTTOM_PAD = 20;

function computeLayout() {
  let y = TOP_PAD;
  LAYERS.forEach((L, i) => {
    L.y = y;
    L.x = TRUNK_X;
    L.r = rForLayer(L.bn);
    const isOpen = expanded.has(L.id);
    if (isOpen) {
      L.children.forEach((sub, j) => {
        sub._uid = L.id + '-s' + j;
        sub.parent = L;
        sub.x = SUB_X;
        sub.y = L.y + SUB_FIRST_OFFSET + j * SUB_VERT_STEP;
        sub.r = rForSub(sub.bn);
      });
      const lastSubY = L.y + SUB_FIRST_OFFSET + (L.children.length - 1) * SUB_VERT_STEP;
      y = lastSubY + SUB_BOTTOM_PAD + LAYER_SPACING_COLLAPSED * 0.5;
    } else {
      y += LAYER_SPACING_COLLAPSED;
    }
  });
  return y + TOP_PAD;
}

function render() {
  const totalHeight = computeLayout();
  const width = Math.min(window.innerWidth, 480);

  // Build SVG
  let trunkLinks = '';
  for (let i = 0; i < LAYERS.length - 1; i++) {
    const a = LAYERS[i], b = LAYERS[i+1];
    trunkLinks += `<line class="trunk" x1="${a.x}" y1="${a.y + a.r + 2}" x2="${b.x}" y2="${b.y - b.r - 4}" marker-end="url(#arrow)"/>`;
  }

  let nodes = '';
  let branches = '';
  LAYERS.forEach(L => {
    const isOpen = expanded.has(L.id);
    const warnMark = L.warn ? ' ⚠️' : '';
    // Layer label above
    nodes += `
      <g class="node layer ${L.chain} ${isOpen ? 'expanded' : ''}" data-layer="${L.id}">
        <text class="layer-id" x="${L.x + L.r + 10}" y="${L.y - 4}">${L.id}</text>
        <text x="${L.x + L.r + 10}" y="${L.y + 14}">${L.name}${warnMark}</text>
        <circle cx="${L.x}" cy="${L.y}" r="${L.r}"/>
      </g>
    `;
    if (isOpen) {
      L.children.forEach(sub => {
        // Branch from trunk to sub
        branches += `<path class="branch" d="M ${L.x + L.r},${L.y} Q ${L.x + 30},${sub.y} ${sub.x - sub.r - 2},${sub.y}"/>`;
        const count = (sub.tickers || []).length;
        const warn = sub.warn ? ' ⚠️' : '';
        nodes += `
          <g class="node sub ${L.chain}" data-sub="${sub._uid}">
            <circle cx="${sub.x}" cy="${sub.y}" r="${sub.r}"/>
            <text x="${sub.x + sub.r + 8}" y="${sub.y + 4}">${sub.name}${warn}</text>
            <text class="count-badge" x="${width - 20}" y="${sub.y + 4}" text-anchor="end">${count}</text>
          </g>
        `;
      });
    }
  });

  const svg = `
    <svg width="${width}" height="${totalHeight}" viewBox="0 0 ${width} ${totalHeight}">
      <defs>
        <marker id="arrow" viewBox="0 -4 8 8" refX="8" refY="0" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,-3L8,0L0,3" class="arrow-marker"/>
        </marker>
      </defs>
      ${trunkLinks}
      ${branches}
      ${nodes}
    </svg>
  `;
  canvas.innerHTML = svg;
}

function bnMeterHtml(bn, chain) {
  let html = `<span class="bn-meter" style="color:${chainColor[chain]||'#8e8e93'}">`;
  for (let i = 1; i <= 5; i++) {
    html += `<span class="bn-bar ${i<=bn?'on':''}"></span>`;
  }
  return html + `</span>`;
}

// Bottom sheet
const sheet = document.getElementById('sheet');
const backdrop = document.getElementById('backdrop');
const sheetTitle = document.getElementById('sheetTitle');
const sheetSub = document.getElementById('sheetSub');
const tickerList = document.getElementById('tickerList');

function openSheet(subUid) {
  let sub, layer;
  for (const L of LAYERS) {
    const found = L.children.find(s => s._uid === subUid);
    if (found) { sub = found; layer = L; break; }
  }
  if (!sub) return;
  const sorted = (sub.tickers || []).slice().sort((a,b) => (statusOrder[a.status]??3)-(statusOrder[b.status]??3));
  sheetTitle.innerHTML = `${sub.name}${sub.warn?' ⚠️':''} ${bnMeterHtml(sub.bn, layer.chain)}`;
  sheetSub.textContent = `${layer.id} ${layer.name} · ${sorted.length} 个候选标的`;
  if (sorted.length === 0) {
    tickerList.innerHTML = `<div class="empty-state">待填</div>`;
  } else {
    tickerList.innerHTML = sorted.map(t => `
      <div class="ticker-row">
        <span class="ticker-code">${t.code}</span>
        <span class="ticker-name">${t.name || ''}</span>
        <span class="ticker-tag ${t.status}">${statusLabel[t.status]||'候选'}</span>
      </div>
    `).join('');
  }
  sheet.classList.add('open');
  backdrop.classList.add('open');
}
function closeSheet() {
  sheet.classList.remove('open');
  backdrop.classList.remove('open');
}
backdrop.addEventListener('click', closeSheet);

// Swipe-down to dismiss
let startY = 0, currentY = 0, dragging = false;
sheet.addEventListener('touchstart', e => {
  if (!e.target.closest('.sheet-handle') && !e.target.closest('.sheet-header')) return;
  startY = e.touches[0].clientY; dragging = true;
  sheet.style.transition = 'none';
});
sheet.addEventListener('touchmove', e => {
  if (!dragging) return;
  currentY = e.touches[0].clientY - startY;
  if (currentY < 0) currentY = 0;
  sheet.style.transform = `translateY(${currentY}px)`;
});
sheet.addEventListener('touchend', () => {
  if (!dragging) return;
  sheet.style.transition = '';
  sheet.style.transform = '';
  if (currentY > 80) closeSheet();
  dragging = false; currentY = 0;
});

// Interactions
canvas.addEventListener('click', e => {
  const layerNode = e.target.closest('[data-layer]');
  if (layerNode) {
    const id = layerNode.dataset.layer;
    if (expanded.has(id)) expanded.delete(id);
    else expanded.add(id);
    render();
    return;
  }
  const subNode = e.target.closest('[data-sub]');
  if (subNode) openSheet(subNode.dataset.sub);
});

window.addEventListener('resize', render);
render();
</script>
</body>
</html>
